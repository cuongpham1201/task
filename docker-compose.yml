# PostgreSQL cho môi trường dev/staging (server Ubuntu nội bộ).
# Trên máy dev Windows đã có sẵn PostgreSQL service thì không cần file này.
services:
  postgres:
    image: postgres:16-alpine
    container_name: giaoviec-postgres
    environment:
      POSTGRES_USER: giaoviec
      POSTGRES_PASSWORD: giaoviec
      POSTGRES_DB: giaoviec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
